name: Apply verified chatbot patches
on:
  push:
    branches:
      - landing+chatbot
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: landing+chatbot
      - name: Restore base and apply exact patches
        run: |
          git fetch origin main
          git checkout origin/main -- index.html css/style.css js/script.js
          git apply .codex-patches/index.patch
          git apply .codex-patches/style.patch
          git apply .codex-patches/script.patch
          rm -rf .codex-patches .github/workflows/apply-codex-patches.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html css/style.css js/script.js .codex-patches .github/workflows/apply-codex-patches.yml
          git commit -m "feat: add sector-aware live landing preview"
          git push origin HEAD:landing+chatbot